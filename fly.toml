# Fly.io config for Monetrex API (Express + SQLite on a persistent volume)
#
# One-time setup (run these before `fly deploy`):
#   1. Install flyctl:          https://fly.io/docs/hands-on/install-flyctl/
#   2. Sign up / log in:        fly auth signup   OR   fly auth login
#   3. Create the app:          fly apps create monetrex-api   (must be globally unique — pick your own name)
#   4. Update `app` below to match the name you chose in step 3
#   5. Create persistent volume: fly volumes create monetrex_data --region sin --size 1
#   6. Set secrets:
#        fly secrets set \
#          JWT_SECRET="$(node -e "console.log(require('crypto').randomBytes(64).toString('hex'))")" \
#          CSRF_SECRET="$(node -e "console.log(require('crypto').randomBytes(64).toString('hex'))")" \
#          ALLOWED_ORIGINS="https://your-app.vercel.app"
#   7. Deploy:                  fly deploy
#
# After deploy, copy the app URL (https://<app-name>.fly.dev) and set it as
# VITE_API_URL=https://<app-name>.fly.dev/api in your Vercel project, then redeploy Vercel.

app            = 'monetrex-api'   # ← change to your unique app name from step 3
primary_region = 'sin'            # Singapore — closest free region to India
                                  # Other options: bom (Mumbai), fra (Frankfurt), lax (LA)

[build]

[env]
  NODE_ENV = 'production'
  DATA_DIR = '/data'              # SQLite file lives on the volume, not the container FS

[http_service]
  internal_port       = 3001
  force_https         = true
  auto_stop_machines  = 'stop'   # Machine sleeps when idle — volume persists, data is safe
  auto_start_machines = true     # Wakes up automatically on next request
  min_machines_running = 0       # 0 = free (cold starts); set to 1 to always keep warm

  [http_service.concurrency]
    type       = 'connections'
    hard_limit = 25
    soft_limit = 20

[[vm]]
  memory   = '256mb'
  cpu_kind = 'shared'
  cpus     = 1

# Persistent volume — SQLite DB file lives here, survives restarts and redeployments
[[mounts]]
  source       = 'monetrex_data'
  destination  = '/data'
  initial_size = '1gb'
